services:
  # Servicio de base de datos MySQL
  db:
    image: mysql:8.0
    container_name: inventario_motos_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: luigi21plus
      MYSQL_DATABASE: inventario_motos
      MYSQL_USER: admin
      MYSQL_PASSWORD: luigi21plus
    ports:
      - "3307:3306"   # 3306 ocupado por MySQL local → usamos 3307 en el host
    volumes:
      # Carga inicial de la base de datos
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      # Volumen para persistir los datos
      - db_data:/var/lib/mysql
    networks:
      - app-network

  # Servicio web con PHP
  web:
    build: .
    container_name: inventario_motos_web
    restart: unless-stopped
    ports:
      - "8080:80"
    # Variables de entorno que PHP leerá via $_ENV
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: inventario_motos
      DB_USER: admin
      DB_PASS: luigi21plus
      APP_ENV: development
      APP_DEBUG: "true"
      STOCK_MINIMO_ALERTA: 5
    volumes:
      # Hot-reload: cambios en src se reflejan sin rebuild
      - ./src:/var/www/html
    depends_on:
      - db
    networks:
      - app-network

# Volúmenes definidos
volumes:
  db_data:

# Red interna para comunicación entre contenedores
networks:
  app-network:
    driver: bridge