version: '3.8'

services:
  # Servicio de base de datos MySQL
  db:
    image: mysql:8.0
    container_name: inventario_motos_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: luigi21plus      
      MYSQL_DATABASE: inventario_motos
      MYSQL_USER: admin
      MYSQL_PASSWORD: luigi21plus                
    ports:
      - "3306:3306"                           
    volumes:
      # Carga inicial de la base de datos
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      # Volumen para persistir los datos
      - db_data:/var/lib/mysql
    networks:
      - app-network

  # Servicio web con PHP
  web:
    build: .                                  
    container_name: inventario_motos_web
    restart: unless-stopped
    ports:
      - "8080:80"                              
      # Accedes a la app en http://localhost:8080
    volumes:
      # Monta el código en modo desarrollo (cambios en caliente)
      - ./src:/var/www/html
    depends_on:
      - db
    networks:
      - app-network

# Volúmenes definidos
volumes:
  db_data:

# Red interna para comunicación entre contenedores
networks:
  app-network:
    driver: bridge